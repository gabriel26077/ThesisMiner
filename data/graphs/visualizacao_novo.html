<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ThesisMiner Mapeamento de Tópicos (AI)</title>

    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at 10% 20%, #1a1a2e 0%, #0d0d1a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        #mynetwork {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .glass-panel {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
            background: rgba(20, 20, 35, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            width: 320px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: -webkit-linear-gradient(45deg, #FF6B6B, #48DBFB);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 13px;
            color: #a0a0b5;
            margin: 0 0 20px 0;
            font-weight: 400;
            line-height: 1.5;
        }

        select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            cursor: pointer;
        }

        select:focus {
            border-color: #48DBFB;
            box-shadow: 0 0 10px rgba(72, 219, 251, 0.3);
        }

        option {
            background:#1a1a2e;
            color:#fff;
        }

        .stats {
            margin-top: 20px;
            font-size: 13px;
            color: #dcdcdc;
            line-height: 1.6;
        }

        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-right: 5px;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>

        let network = null;

        function renderGraph() {
            const select = document.getElementById("anoSelect");
            const cenario = select.value;
            const data = GRAPH_DB[cenario];
            
            if(!data) return;

            const container = document.getElementById("mynetwork");
            
            // Stats Update
            const nodesCount = data.nodes.length;
            const edgesCount = data.edges.length;
            document.getElementById("statsPanel").innerHTML = `
                <div><span class="badge">Nós</span> ${nodesCount} Tópicos descobertos</div>

                    scaling: {
                        min: 15,
                        max: 60,

                    },

                }
            };

            };

                network.destroy();
            }
            network = new vis.Network(container, visData, options);
        }
